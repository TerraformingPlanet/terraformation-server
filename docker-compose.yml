services:

  # -------------------------------------------------------------------------
  # PostgreSQL — authoritative state store
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: terraformation-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: terraformation
      POSTGRES_USER: terra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-terralocal}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U terra -d terraformation"]
      interval: 5s
      timeout: 3s
      retries: 5

  # -------------------------------------------------------------------------
  # FastMCP — AI agent bridgée for the Terraformation game
  # Phase 2: connects to Unity running on the Docker host (port 48621)
  # Phase 3: change GAME_BRIDGE_URL to http://unity-server:48621 once
  #          the Unity dedicated server is containerised
  # -------------------------------------------------------------------------
  terraformation-mcp:
    build:
      context: ./Mcp
      dockerfile: Dockerfile
    container_name: terraformation-mcp
    depends_on:
      - terraformation-dedicated-server
      - postgres
    ports:
      - "8000:8000"
    environment:
      MCP_TRANSPORT: http
      MCP_PORT: "8000"
      # host.docker.internal resolves to the Windows host on Docker Desktop
      GAME_BRIDGE_URL: http://host.docker.internal:48621
      SIMULATION_SERVER_URL: ${SIMULATION_SERVER_URL:-http://terraformation-dedicated-server:8080}
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Dedicated simulation host.
  # Canonical stack: docker compose up -d
  # -------------------------------------------------------------------------
  terraformation-dedicated-server:
    build:
      context: .
      dockerfile: DedicatedServer/Dockerfile
    image: terraformation-dedicated-server-local:latest
    container_name: terraformation-dedicated-server
    ports:
      - "8080:8080"
    environment:
      SERVER_MODE: ${SERVER_MODE:-postgres}
      SERVER_TICK_INTERVAL: "5.0"
      SERVER_AUTO_RESUME: "0"
      DATABASE_URL: postgresql+psycopg2://terra:${POSTGRES_PASSWORD:-terralocal}@postgres:5432/terraformation
      # ── Agent LLM (Phase 8.5) ──────────────────────────────────────────────
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODE: ${LLM_MODE:-json}
      AGENT_TICK_INTERVAL: ${AGENT_TICK_INTERVAL:-10}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; payload=json.load(urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5)); raise SystemExit(0 if payload.get('service') == 'terraformation-dedicated-server' else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Dedicated-server smoke runner.
  # Uses the same image and validates generation presets without Unity.
  # Run with: docker compose --profile smoke run --rm terraformation-generation-smoke
  # -------------------------------------------------------------------------
  terraformation-generation-smoke:
    image: terraformation-dedicated-server-local:latest
    profiles: ["smoke"]
    depends_on:
      postgres:
        condition: service_healthy
      terraformation-dedicated-server:
        condition: service_healthy
    environment:
      SERVER_MODE: ${SERVER_MODE:-postgres}
      DATABASE_URL: postgresql+psycopg2://terra:${POSTGRES_PASSWORD:-terralocal}@postgres:5432/terraformation
    command: ["python", "-m", "app.generation_smoke", "--base-url", "http://terraformation-dedicated-server:8080", "--json"]
    restart: "no"

volumes:
  postgres_data:

